name: Build WRAITH APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p project/app/src/main/java/io/github/wraithapp
          mkdir -p project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p project/app/src/main/res/values
          mkdir -p project/gradle/wrapper

          curl -L https://wraithapp.github.io/Wraith-/icon-512.png -o project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > project/settings.gradle << 'EOF'
          rootProject.name = "WRAITH"
          include ':app'
          EOF

          cat > project/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > project/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "io.github.wraithapp.twa"
                  minSdk 21
                  targetSdk 34
                  versionCode 2
                  versionName "1.1"
              }
              buildTypes {
                  debug { }
              }
              namespace "io.github.wraithapp"
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application
                  android:label="WRAITH"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://wraithapp.github.io/Wraith-/"/>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="wraithapp.github.io"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > project/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">WRAITH</string>
          </resources>
          EOF

          cat > project/app/src/main/java/io/github/wraithapp/Application.java << 'EOF'
          package io.github.wraithapp;
          public class Application extends android.app.Application {}
          EOF

      - name: Build Debug APK
        run: |
          cd project
          gradle wrapper
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WRAITH-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
