workflows:
  android-workflow:
    name: Wraith Android Build
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Wraith com.wraith.app --web-dir www
          npx cap add android
          npx cap sync
      - name: Force Gradle 8.7
        script: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          rm -rf /Users/builder/.gradle/caches/jars-9
      - name: Build APK
        script: |
          cd android
          ./gradlew clean assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
