workflows:
  android-workflow:
    name: Wraith Android Build
    instance_type: mac_mini_m1
    environment:
      java: 21
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Wraith com.wraith.app --web-dir www
          npx cap add android
          npx cap sync
      - name: Fix Gradle config
        script: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          rm -rf /Users/builder/.gradle/caches/jars-9
          find android -name "build.gradle" | while read f; do
            sed -i '' 's/JavaVersion.VERSION_[0-9_]*/JavaVersion.VERSION_21/g' "$f"
            sed -i '' 's/sourceCompatibility = [0-9.]*/sourceCompatibility = JavaVersion.VERSION_21/g' "$f"
            sed -i '' 's/targetCompatibility = [0-9.]*/targetCompatibility = JavaVersion.VERSION_21/g' "$f"
            sed -i '' 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' "$f"
            sed -i '' 's/compileSdk = [0-9]*/compileSdk = 35/g' "$f"
            sed -i '' 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' "$f"
            sed -i '' 's/targetSdk = [0-9]*/targetSdk = 35/g' "$f"
          done
      - name: Build APK
        script: |
          cd android
          ./gradlew clean assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
