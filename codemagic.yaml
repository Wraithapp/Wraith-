workflows:
  android-workflow:
    name: Wraith Android Build
    instance_type: mac_mini_m1
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build PWA
        script: npm run build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Wraith com.wraith.app --web-dir dist
          npx cap add android
          npx cap sync
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
 
