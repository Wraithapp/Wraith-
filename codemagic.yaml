workflows:
  android-workflow:
    name: Wraith Android Build
    instance_type: mac_mini_m1
    environment:
      java: 21
      node: 18
    scripts:
      - name: Install Bubblewrap
        script: |
          npm install -g @bubblewrap/cli
          bubblewrap --version
      - name: Init TWA project
        script: |
          mkdir twa && cd twa
          bubblewrap init --manifest https://wraithapp.github.io/Wraith-/manifest.json --directory .
      - name: Build APK
        script: |
          cd twa
          bubblewrap build
    artifacts:
      - twa/app-release-unsigned.apk
      - twa/*.apk
 
