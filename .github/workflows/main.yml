name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA
        run: echo "n" | bubblewrap init --manifest https://wraithapp.github.io/Wraith-/manifest.json

      - name: Build APK
        run: echo "n" | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WRAITH-APK
          path: "*.apk"
          if-no-files-found: warn
